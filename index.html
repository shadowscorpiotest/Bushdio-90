<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LifeHub — Your Life OS</title>
<meta name="description" content="All your life. All in one place. Habits, health, learning, projects and more — with XP, streaks and badges.">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" href="icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#6a5ae0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LifeHub">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- Desktop / tablet sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="side-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48"><rect width="48" height="48" rx="14" class="mark-bg"/><g class="mark-leaf" transform="translate(24 24)"><g><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/><g transform="rotate(60)"><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/></g><g transform="rotate(120)"><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/></g><g transform="rotate(180)"><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/></g><g transform="rotate(240)"><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/></g><g transform="rotate(300)"><ellipse cx="0" cy="-10.1" rx="3.2" ry="6.9"/></g></g></g><circle cx="24" cy="24" r="3.6" class="mark-bg"/><circle cx="24" cy="24" r="3.6" fill="none" stroke-width="1.6" class="mark-leaf-stroke"/></svg>
      </span>
      <span class="brand-text">
        <strong>LifeHub</strong>
        <small>your life OS</small>
      </span>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <div class="shell">
    <header class="topbar">
      <button class="icon-btn only-mobile" id="menuBtn" aria-label="Open navigation"></button>
      <div class="topbar-title">
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub"></p>
      </div>
      <div class="topbar-actions">
        <button class="chip chip-streak" id="streakChip" data-nav="progress" title="Perfect-day streak"></button>
        <button class="chip chip-level" id="levelChip" data-nav="profile" title="Your level and XP"></button>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle light / dark theme"></button>
        <button class="avatar-btn" id="avatarBtn" data-nav="profile" aria-label="Open profile"></button>
      </div>
    </header>

    <main class="view" id="view" tabindex="-1"></main>
  </div>
</div>

<!-- Mobile bottom navigation -->
<nav class="bottomnav" id="bottomNav" aria-label="Quick navigation"></nav>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<!-- Mobile nav drawer -->
<div class="drawer-backdrop" id="drawerBackdrop" hidden>
  <aside class="drawer" id="drawer" aria-label="All areas"></aside>
</div>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>
<div class="tip" id="tip" hidden></div>

<script src="app.js"></script>
</body>
</html>
