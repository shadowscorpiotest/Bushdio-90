<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LifeHub — Your Life OS</title>
<meta name="description" content="All your life. All in one place. Habits, health, learning, projects and more — with XP, streaks and badges.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%236a5ae0'/><path d='M50 78 C50 56 38 48 24 46 C26 66 38 76 50 78 Z M50 78 C50 52 64 42 78 40 C76 64 62 76 50 78 Z' fill='white'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- Desktop / tablet sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="side-brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48"><rect width="48" height="48" rx="14" class="mark-bg"/><path d="M24 37 C24 26 18 22 11 21 C12 31 18 36 24 37 Z M24 37 C24 24 31 19 37 18 C36 30 30 36 24 37 Z" class="mark-leaf"/></svg>
      </span>
      <span class="brand-text">
        <strong>LifeHub</strong>
        <small>your life OS</small>
      </span>
    </div>
    <nav class="side-nav" id="sideNav"></nav>
    <div class="side-foot" id="sideFoot"></div>
  </aside>

  <div class="shell">
    <header class="topbar">
      <button class="icon-btn only-mobile" id="menuBtn" aria-label="Open navigation"></button>
      <div class="topbar-title">
        <h1 id="pageTitle">Dashboard</h1>
        <p id="pageSub"></p>
      </div>
      <div class="topbar-actions">
        <button class="chip chip-streak" id="streakChip" data-nav="progress" title="Perfect-day streak"></button>
        <button class="chip chip-level" id="levelChip" data-nav="profile" title="Your level and XP"></button>
        <button class="icon-btn" id="themeBtn" aria-label="Toggle light / dark theme"></button>
        <button class="avatar-btn" id="avatarBtn" data-nav="profile" aria-label="Open profile"></button>
      </div>
    </header>

    <main class="view" id="view" tabindex="-1"></main>
  </div>
</div>

<!-- Mobile bottom navigation -->
<nav class="bottomnav" id="bottomNav" aria-label="Quick navigation"></nav>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<!-- Mobile nav drawer -->
<div class="drawer-backdrop" id="drawerBackdrop" hidden>
  <aside class="drawer" id="drawer" aria-label="All areas"></aside>
</div>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>
<div class="tip" id="tip" hidden></div>

<script src="app.js"></script>
</body>
</html>
