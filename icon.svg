<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b7bf3"/>
      <stop offset="0.55" stop-color="#6a5ae0"/>
      <stop offset="1" stop-color="#4f3cc4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.28" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petal" x1="256" y1="82" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eee9ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>
  <!-- life bloom: 6 petals (life areas) radiating from a hub -->
  <g transform="translate(256 256)" fill="url(#petal)">
    <g>
      <ellipse cx="0" cy="-108" rx="34" ry="74"/>
      <g transform="rotate(60)"><ellipse cx="0" cy="-108" rx="34" ry="74"/></g>
      <g transform="rotate(120)"><ellipse cx="0" cy="-108" rx="34" ry="74"/></g>
      <g transform="rotate(180)"><ellipse cx="0" cy="-108" rx="34" ry="74"/></g>
      <g transform="rotate(240)"><ellipse cx="0" cy="-108" rx="34" ry="74"/></g>
      <g transform="rotate(300)"><ellipse cx="0" cy="-108" rx="34" ry="74"/></g>
    </g>
  </g>
  <circle cx="256" cy="256" r="40" fill="#6a5ae0"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="#ffffff" stroke-width="10"/>
</svg>
